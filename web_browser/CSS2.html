<!-- 다양한 스타일 적용, 박스 모델 -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS2_various_style</title>
    <style>
        body {
            background-color: yellow;
        }

        #button {
            width: 120px;
            height: 25px;
            padding: 8px;
            background-color: blue;
            color: white;
            text-align: center;
        }

        p {
            color: grey;
        }

        #p1 {
            color: blue;
        }

        #p2 {
            color: green;
        }

        h3 {
            border: solid 5px blue;
            padding: 20px;
            margin: 30px;
            /*padding: 상 우 하 좌*/
        }
    </style>
</head>

<body>
    <p id='p1'>안녕하세요</p>
    <p id='p2'>반갑습니다</p>
    <p>또 만나요</p>

    <h3>웹이란</h3>

    <h4>캠핑장 9월 예약</h4>
    <ul>
        <li>9월분 예약 2019년 8월 16일(수)</li>
        <li>문의 전화 : 031-222-1234</li>
    </ul>
    <div id="button">자세히 보기 &gt;</div>
</body>

</html>
