<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table1</title>
    <style>
        table,tr,th,td{
            border: solid 1px black;
            border-collapse: collapse;
            padding: 8px;
        }
    </style>
</head>
<body>
    <h3>KTX 열차 시간표</h3>
    <table>
        <tr>
             <th>출발</th> <!--셀제목-->
             <th>도착</th>
             <th>객실</th>
             <th>요금</th>
        </tr>
        <tr>
            <td>서울(17:15)</td>  <!--셀-->
            <td>부산(20:07)</td>
            <td>일반실</td>
            <td>50,000원</td>
        </tr>
        <tr>
            <td>서울(18:00)</td>
            <td>부산(20:35)</td>
            <td>특실</td>
            <td>83,700</td>
        </tr>
    </table>
</body>
</html>
