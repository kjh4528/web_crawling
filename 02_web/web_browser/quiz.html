<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서 신청</title>
    <style>
        body {
            background-color: #f5f5f5;
        }

        h2 {
            color: darkblue;
            font-size: 30px;
        }

        #form-container {
            border: 2px solid #555;
            padding: 20px;
            width: 300px;
            background-color: white;
        }

        .guide {
            color: gray;
            margin: 15px;
        }
    </style>
</head>

<body>
    <h2>도서 신청</h2>
    <p class="guide">원하시는 도서를 아래 양식에 맞게 신청해 주세요.</p>
    <img src="book.jpg" alt="도서 이미지" width="150">

    <div id="form-container">
        <form>
            <p>이름: <input type="text"></p>
            <p>비밀번호: <input type="password"></p>
            <p>도서 종류:
                <input type="radio" name="genre"> 소설
                <input type="radio" name="genre"> 비소설
            </p>
            <button type="submit"> 신청하기 </button>
        </form>
    </div>
    <a href="https://www.nl.go.kr">도서관 홈페이지</a>
</body>

</html>
